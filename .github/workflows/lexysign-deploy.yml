name: Deploy LexySign

on:
  push:
    branches: [staging, main]
    paths:
      - 'apps/OpenSign/**'
      - 'apps/OpenSignServer/**'
      - 'deploy/lexysign/**'
      - '.github/workflows/lexysign-deploy.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options: [staging, production]
        default: staging
      image_tag:
        description: Optional image tag override; defaults to staging/prod SHA tag
        required: false
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: lexysign-deploy-${{ github.event.inputs.environment || (github.ref_name == 'main' && 'production' || 'staging') }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: peacockesq

jobs:
  select-environment:
    runs-on: ubuntu-latest
    outputs:
      target: ${{ steps.select.outputs.target }}
      image_tag: ${{ steps.select.outputs.image_tag }}
      public_url: ${{ steps.select.outputs.public_url }}
      project_name: ${{ steps.select.outputs.project_name }}
      deploy_path: ${{ steps.select.outputs.deploy_path }}
      client_container: ${{ steps.select.outputs.client_container }}
      server_container: ${{ steps.select.outputs.server_container }}
      mongo_container: ${{ steps.select.outputs.mongo_container }}
      network_name: ${{ steps.select.outputs.network_name }}
    steps:
      - id: select
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TARGET="${{ github.event.inputs.environment }}"
          elif [[ "${{ github.ref_name }}" == "main" ]]; then
            TARGET="production"
          else
            TARGET="staging"
          fi
          if [[ "$TARGET" == "production" ]]; then
            PREFIX="prod"
            PUBLIC_URL="https://sign.lexyalgo.com"
            PROJECT_NAME="lexysign"
            DEPLOY_PATH="/opt/lexysign"
            CLIENT_CONTAINER="lexysign-client"
            SERVER_CONTAINER="lexysign-server"
            MONGO_CONTAINER="lexysign-mongo"
            NETWORK_NAME="lexysign_lexysign"
          else
            PREFIX="staging"
            PUBLIC_URL="https://sign-staging.lexyalgo.com"
            PROJECT_NAME="lexysign-staging"
            DEPLOY_PATH="/opt/lexysign-staging"
            CLIENT_CONTAINER="lexysign-staging-client"
            SERVER_CONTAINER="lexysign-staging-server"
            MONGO_CONTAINER="lexysign-staging-mongo"
            NETWORK_NAME="lexysign-staging_lexysign"
          fi
          TAG="${{ github.event.inputs.image_tag }}"
          if [[ -z "$TAG" ]]; then
            TAG="${PREFIX}-${GITHUB_SHA::12}"
          fi
          echo "target=$TARGET" >> "$GITHUB_OUTPUT"
          echo "image_tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "public_url=$PUBLIC_URL" >> "$GITHUB_OUTPUT"
          echo "project_name=$PROJECT_NAME" >> "$GITHUB_OUTPUT"
          echo "deploy_path=$DEPLOY_PATH" >> "$GITHUB_OUTPUT"
          echo "client_container=$CLIENT_CONTAINER" >> "$GITHUB_OUTPUT"
          echo "server_container=$SERVER_CONTAINER" >> "$GITHUB_OUTPUT"
          echo "mongo_container=$MONGO_CONTAINER" >> "$GITHUB_OUTPUT"
          echo "network_name=$NETWORK_NAME" >> "$GITHUB_OUTPUT"

  build-and-push:
    needs: select-environment
    runs-on: ubuntu-latest
    environment: ${{ needs.select-environment.outputs.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: client
            dockerfile: apps/OpenSign/Dockerfile.lexysign
          - name: server
            dockerfile: apps/OpenSignServer/Dockerfile.lexysign
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push LexySign ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/lexysign-${{ matrix.name }}:${{ needs.select-environment.outputs.image_tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/lexysign-${{ matrix.name }}:${{ needs.select-environment.outputs.target }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            com.lexysign.environment=${{ needs.select-environment.outputs.target }}
          build-args: |
            REACT_APP_SERVERURL=${{ needs.select-environment.outputs.public_url }}/api/app
            REACT_APP_APPID=opensign
            REACT_APP_FORCE_DRAWN_SIGNATURES=false
            VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
            VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}

  deploy:
    needs: [select-environment, build-and-push]
    runs-on: ubuntu-latest
    timeout-minutes: 35
    environment: ${{ needs.select-environment.outputs.target }}
    steps:
      - uses: actions/checkout@v4
      - name: Install SSH key
        shell: bash
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.LEXYSIGN_DEPLOY_SSH_KEY }}" > ~/.ssh/lexysign_deploy_key
          chmod 600 ~/.ssh/lexysign_deploy_key
          ssh-keyscan -T 30 -p "${{ vars.LEXYSIGN_DEPLOY_PORT || '22' }}" "${{ vars.LEXYSIGN_DEPLOY_HOST }}" >> ~/.ssh/known_hosts || true
      - name: Stage deploy files
        shell: bash
        run: |
          tar -czf /tmp/lexysign-deploy.tgz deploy/lexysign/docker-compose.runtime.yml deploy/lexysign/Caddyfile
          scp -o StrictHostKeyChecking=accept-new -i ~/.ssh/lexysign_deploy_key -P "${{ vars.LEXYSIGN_DEPLOY_PORT || '22' }}" /tmp/lexysign-deploy.tgz "${{ vars.LEXYSIGN_DEPLOY_USER || 'root' }}@${{ vars.LEXYSIGN_DEPLOY_HOST }}:/tmp/lexysign-deploy-${{ github.sha }}.tgz"
      - name: Deploy on Hetzner
        shell: bash
        run: |
          ssh -o StrictHostKeyChecking=accept-new -i ~/.ssh/lexysign_deploy_key -p "${{ vars.LEXYSIGN_DEPLOY_PORT || '22' }}" "${{ vars.LEXYSIGN_DEPLOY_USER || 'root' }}@${{ vars.LEXYSIGN_DEPLOY_HOST }}" \
            "GITHUB_SHA='${{ github.sha }}' GITHUB_RUN_ID='${{ github.run_id }}' IMAGE_TAG='${{ needs.select-environment.outputs.image_tag }}' TARGET='${{ needs.select-environment.outputs.target }}' PUBLIC_URL='${{ needs.select-environment.outputs.public_url }}' PROJECT_NAME='${{ needs.select-environment.outputs.project_name }}' DEPLOY_PATH='${{ needs.select-environment.outputs.deploy_path }}' CLIENT_CONTAINER='${{ needs.select-environment.outputs.client_container }}' SERVER_CONTAINER='${{ needs.select-environment.outputs.server_container }}' MONGO_CONTAINER='${{ needs.select-environment.outputs.mongo_container }}' NETWORK_NAME='${{ needs.select-environment.outputs.network_name }}' bash -s" <<'REMOTE'
          set -euo pipefail
          mkdir -p "$DEPLOY_PATH/deploy/lexysign"
          tar -xzf "/tmp/lexysign-deploy-${GITHUB_SHA}.tgz" -C "$DEPLOY_PATH"
          cd "$DEPLOY_PATH/deploy/lexysign"
          if [[ ! -f .env ]]; then
            echo "Missing $PWD/.env. Seed this file from production/staging secrets before deploying." >&2
            exit 20
          fi
          if ! grep -q '^HOST_URL=' .env; then
            printf '\nHOST_URL=%s\n' "$PUBLIC_URL" >> .env
          else
            sed -i "s|^HOST_URL=.*|HOST_URL=${PUBLIC_URL}|" .env
          fi
          {
            echo "LEXYSIGN_IMAGE_TAG=$IMAGE_TAG"
            echo "LEXYSIGN_PROJECT_NAME=$PROJECT_NAME"
            echo "LEXYSIGN_CLIENT_CONTAINER=$CLIENT_CONTAINER"
            echo "LEXYSIGN_SERVER_CONTAINER=$SERVER_CONTAINER"
            echo "LEXYSIGN_MONGO_CONTAINER=$MONGO_CONTAINER"
            echo "HOST_URL=$PUBLIC_URL"
            echo "LEXYSIGN_GIT_SHA=$GITHUB_SHA"
            echo "LEXYSIGN_GITHUB_RUN_ID=$GITHUB_RUN_ID"
          } > .deploy.env
          docker login ghcr.io -u '${{ github.actor }}' -p '${{ secrets.GITHUB_TOKEN }}' >/dev/null 2>&1 || true
          echo "Pulling LexySign images for $TARGET tag $IMAGE_TAG"
          timeout 1200s docker compose --env-file .env --env-file .deploy.env -f docker-compose.runtime.yml pull server
          timeout 1200s docker compose --env-file .env --env-file .deploy.env -f docker-compose.runtime.yml pull client
          if [[ "$TARGET" == "production" ]]; then
            COMPOSE_PROFILES=edge timeout 600s docker compose --env-file .env --env-file .deploy.env -f docker-compose.runtime.yml up -d --remove-orphans
          else
            timeout 600s docker compose --env-file .env --env-file .deploy.env -f docker-compose.runtime.yml up -d --remove-orphans
          fi
          if docker ps --format '{{.Names}}' | grep -qx lexysign-caddy; then
            cp Caddyfile /opt/lexysign/deploy/lexysign/Caddyfile
            for network in "$NETWORK_NAME" lexysign_lexysign lexysign-staging_lexysign lexy-filing-staging_lexy-staging lexycorpus_default; do
              docker network connect "$network" lexysign-caddy 2>/dev/null || true
            done
            docker exec lexysign-caddy caddy validate --config /etc/caddy/Caddyfile
            docker exec lexysign-caddy caddy reload --config /etc/caddy/Caddyfile
          fi
          rm -f "/tmp/lexysign-deploy-${GITHUB_SHA}.tgz"
          REMOTE
      - name: Runtime smoke
        shell: bash
        run: |
          curl --max-time 45 -fsSIL --retry 8 --retry-delay 5 "${{ needs.select-environment.outputs.public_url }}/" | sed -n '1,12p'
          curl --max-time 45 -fsSL --retry 8 --retry-delay 5 "${{ needs.select-environment.outputs.public_url }}/api/billing/status" || true
