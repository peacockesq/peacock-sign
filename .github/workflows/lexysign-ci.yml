name: LexySign CI

on:
  pull_request:
    branches: [staging, main, lexysign-hetzner-prep]
    paths:
      - 'apps/OpenSign/**'
      - 'apps/OpenSignServer/**'
      - 'deploy/lexysign/**'
      - '.github/workflows/lexysign-*.yml'
  push:
    branches: [lexysign-hetzner-prep, staging, main]
    paths:
      - 'apps/OpenSign/**'
      - 'apps/OpenSignServer/**'
      - 'deploy/lexysign/**'
      - '.github/workflows/lexysign-*.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: read

concurrency:
  group: lexysign-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Server syntax checks
        run: |
          node --check apps/OpenSignServer/Utils.js
          node --check apps/OpenSignServer/cloud/customRoute/billing.js
          node --check apps/OpenSignServer/billing/stripeClient.js
          node --check apps/OpenSignServer/cloud/parsefunction/loginWithSupabase.js
          node --check apps/OpenSignServer/cloud/customRoute/docxtopdf.js
      - name: Secret value scan on changed files
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
          fi
          if [[ -z "$BASE_SHA" || "$BASE_SHA" =~ ^0+$ ]]; then
            BASE_SHA="${{ github.sha }}^"
          fi
          git diff --name-only "$BASE_SHA" "${{ github.sha }}" \
            | grep -Ev '(^|/)(package-lock\.json|.*\.png|.*\.ico)$' \
            > /tmp/changed-files.txt || true
          if [[ -s /tmp/changed-files.txt ]]; then
            ! xargs grep -nE 'AKIA[0-9A-Z]{16}|-----BEGIN (RSA|OPENSSH|EC|DSA)? ?PRIVATE KEY-----|sk_live_[A-Za-z0-9]{20,}|whsec_[A-Za-z0-9]{20,}|xox[baprs]-[A-Za-z0-9-]{20,}|eyJ[A-Za-z0-9_-]{20,}\.[A-Za-z0-9_-]{20,}\.[A-Za-z0-9_-]{20,}' < /tmp/changed-files.txt
          fi

  docker-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: client
            dockerfile: apps/OpenSign/Dockerfile.lexysign
          - name: server
            dockerfile: apps/OpenSignServer/Dockerfile.lexysign
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build LexySign ${{ matrix.name }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          load: false
          tags: ghcr.io/peacockesq/lexysign-${{ matrix.name }}:ci-${{ github.sha }}
          build-args: |
            REACT_APP_SERVERURL=https://sign-ci.invalid/api/app
            REACT_APP_APPID=opensign
            REACT_APP_FORCE_DRAWN_SIGNATURES=false
            VITE_SUPABASE_URL=https://ci.invalid
            VITE_SUPABASE_ANON_KEY=ci-placeholder
