name: LexySign CI

on:
  pull_request:
    paths:
      - 'apps/OpenSign/**'
      - 'apps/OpenSignServer/**'
      - 'deploy/lexysign/**'
      - '.github/workflows/lexysign-*.yml'
  push:
    branches: [lexysign-hetzner-prep, staging, main]
    paths:
      - 'apps/OpenSign/**'
      - 'apps/OpenSignServer/**'
      - 'deploy/lexysign/**'
      - '.github/workflows/lexysign-*.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: read

concurrency:
  group: lexysign-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Server syntax checks
        run: |
          node --check apps/OpenSignServer/Utils.js
          node --check apps/OpenSignServer/cloud/customRoute/billing.js
          node --check apps/OpenSignServer/billing/stripeClient.js
          node --check apps/OpenSignServer/cloud/parsefunction/loginWithSupabase.js
          node --check apps/OpenSignServer/cloud/customRoute/docxtopdf.js
      - name: Shared edge contract
        run: |
          deploy/lexysign/verify-edge-contract.sh
          deploy/lexysign/test-edge-contract.sh
          HOST_URL=https://sign-ci.invalid docker compose \
            -f deploy/lexysign/docker-compose.yml config --quiet
          HOST_URL=https://sign-ci.invalid docker compose \
            -f deploy/lexysign/docker-compose.runtime.yml --profile edge config --quiet
          docker run --rm \
            -v "$PWD/deploy/lexysign/Caddyfile:/etc/caddy/Caddyfile:ro" \
            caddy:2.8 \
            caddy validate --config /etc/caddy/Caddyfile
      - name: Production dependency audits
        run: |
          npm audit --omit=dev --audit-level=high
          npm --prefix apps/OpenSign audit --omit=dev --audit-level=high
          npm --prefix apps/OpenSignServer audit --omit=dev --audit-level=high
          npm --prefix apps/OpenSign ci --ignore-scripts --no-audit --no-fund
          npm --prefix apps/OpenSignServer ci --ignore-scripts --no-audit --no-fund
          npm --prefix apps/OpenSign test
          npm --prefix apps/OpenSignServer run test:security
          npm --prefix apps/OpenSignServer test
      - name: Secret value scan on changed files
        shell: bash
        run: |
          deploy/lexysign/test-secret-scan.sh
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
          fi
          if [[ -z "$BASE_SHA" || "$BASE_SHA" =~ ^0+$ ]]; then
            BASE_SHA="$(git hash-object -t tree /dev/null)"
          fi
          deploy/lexysign/scan-changed-files-for-secrets.sh \
            "$BASE_SHA" "${{ github.sha }}"

  docker-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: client
            dockerfile: apps/OpenSign/Dockerfile.lexysign
          - name: server
            dockerfile: apps/OpenSignServer/Dockerfile.lexysign
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build LexySign ${{ matrix.name }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          load: false
          tags: ghcr.io/peacockesq/lexysign-${{ matrix.name }}:ci-${{ github.sha }}
          build-args: |
            REACT_APP_SERVERURL=https://sign-ci.invalid/api/app
            REACT_APP_APPID=opensign
            REACT_APP_FORCE_DRAWN_SIGNATURES=false
            VITE_SUPABASE_URL=https://ci.invalid
            VITE_SUPABASE_ANON_KEY=ci-placeholder
